name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2 # Note: flutter-action er jonno v2 stable, v4 ekhon-o proyojon nei
        with:
          flutter-version: '3.19.0'
          cache: true # Build fast korar jonno cache true kora bhalo

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ff-tournament-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          
